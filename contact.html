<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Responsive NavBar</title>
  <link rel="stylesheet" href="style1.css" href="contact.css">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">CodingLab</div>

    <div class="nav-links" id="navLinks">
      <i class="fas fa-times close-btn" onclick="toggleMenu()"></i>
      <ul>
        <li><a href="Home.html">Home</a></li>
        <li><a href="Services.html">Services</a></li>
        <li><a href="Products.html">Products</a></li>
        <li><a href="contact.html">Contact Us</a></li>
        
      </ul>
    </div>

    <input class="search-box" id="searchBox">
      <i class="fas fa-search" id="search-icon"></i>
      <i class="fas fa-times" id="cancel-icon"></i>
      
    </div>
</nav>

<div class="contact-container">
    <h2>Contact Us</h2>
    <form class="contact-form">
      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Your name">

      <label for="address">Address:</label>
      <input type="text" id="address" placeholder="Your address">

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" placeholder="Your phone number">

      <label for="email">Email ✉️:</label>
      <input type="email" id="email" placeholder="Your email">

      <button type="submit">Submit</button>
      </form>
  </div>

  
</body>
</html>
